            --neon-pink: #ff2a85;
            --neon-emerald: #00ffaa;
            --neon-emerald-glow: rgba(0, 255, 170, 0.3);
            --neon-blue: #00f0ff;
            --neon-blue-glow: rgba(0, 240, 255, 0.3);
            --neon-red: #ff3b6f;
            --neon-red-glow: rgba(255, 59, 111, 0.4);
            --neon-amber: #ffb800;
            --neon-amber-glow: rgba(255, 184, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            cursor: crosshair;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(181, 95, 230, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 10% 80%, rgba(0, 240, 255, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 90% 70%, rgba(255, 42, 133, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
            transition: background 1s ease, background-color 1s ease;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Sovereign Purple Glassmorphism */
        .glass-card {
            background: var(--purple-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--purple-border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(181, 95, 230, 0.05), transparent);
            transition: 0.8s;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .glass-card:hover {
            border-color: rgba(181, 95, 230, 0.35);
            box-shadow: 0 0 35px var(--purple-glow);
            transform: translateY(-2px);
        }

        .glass-card.glow-emerald:hover {
            border-color: var(--neon-emerald);
            box-shadow: 0 0 35px var(--neon-emerald-glow);
        }

        .glass-card.glow-red:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 35px var(--neon-red-glow);
        }

        /* Status indicators */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            border: 2px solid currentColor;
            opacity: 0;
            animation: ripple 1.8s infinite ease-out;
        }

        @keyframes ripple {
            0% { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        .bg-emerald { background-color: var(--neon-emerald); color: var(--neon-emerald); }
        .bg-purple { background-color: var(--neon-purple); color: var(--neon-purple); }
        .bg-blue { background-color: var(--neon-blue); color: var(--neon-blue); }
        .bg-red { background-color: var(--neon-red); color: var(--neon-red); }
        .bg-amber { background-color: var(--neon-amber); color: var(--neon-amber); }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #020105;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f1430;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-purple);
        }

        /* Professional tab buttons */
        .tab-btn {
            background: rgba(181, 95, 230, 0.02);
            border: 1px solid var(--purple-border);
            color: var(--text-secondary);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;

            background: rgba(181, 95, 230, 0.12);
            box-shadow: 0 0 25px rgba(181, 95, 230, 0.2);
            transform: translateY(-1px);
        }

        .tab-btn:hover:not(.active) {
            color: #fff;
            border-color: rgba(181, 95, 230, 0.3);
            background: rgba(181, 95, 230, 0.05);
        }

            color: var(--text-secondary);

        }

            color: #fff;
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.02);
        }

        .cure-btn {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            color: #fff;
            font-weight: 900;

            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .cure-btn::before {
            content: '';

            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);

        .cure-btn:hover {
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 0 35px rgba(0, 255, 170, 0.5);
            background: linear-gradient(135deg, var(--neon-emerald), var(--neon-blue));
            color: #020105;
        }

        .cure-btn:hover::before {
            left: 100%;
        }

        .cure-btn:active {
            transform: scale(0.97) translateY(1px);

        .glow-text-emerald { text-shadow: 0 0 15px var(--neon-emerald-glow); }
        .glow-text-purple { text-shadow: 0 0 15px var(--purple-glow); }
        .glow-text-blue { text-shadow: 0 0 15px var(--neon-blue-glow); }
        .glow-text-red { text-shadow: 0 0 15px var(--neon-red-glow); }

            box-shadow: 0 0 35px var(--neon-red-glow) !important;

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.015); }
            100% { transform: scale(1); }

            animation: pulse 2.2s infinite ease-in-out;

            display: grid;
            grid-template-columns: 1.45fr 1fr;
            gap: 28px;
            align-items: stretch;
        }

        .column-flex {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        #app-root {
            min-height: 100vh;
            display: flex;
            flex-direction: column;

        .sovereign-table {
            width: 100%;

            font-size: 0.85rem;
            margin-top: 12px;

        .sovereign-table th {

            color: var(--text-secondary);

        .sovereign-table td {
            padding: 16px;
            border-bottom: 1px solid rgba(181, 95, 230, 0.05);
            vertical-align: middle;
            transition: background 0.3s ease;
        }

        .sovereign-table tr:hover td {
            background: rgba(181, 95, 230, 0.03);
        }
    </style>
</head>

        // SVG Render helpers
        const width = 600;
        const height = 240;
        const padding = 35;

        function getSvgCoords(val, idx, minVal, maxVal) {
            const x = padding + (idx / 12) * (width - padding * 2);
            const y = height - padding - ((val - minVal) / (maxVal - minVal)) * (height - padding * 2);
            return { x, y };
        }

        function buildSvgPath(data, minVal, maxVal) {
            return data.map((d, i) => {
                const { x, y } = getSvgCoords(d.val, i, minVal, maxVal);
                return `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
            }).join(' ');
        }

        function buildSvgAreaPath(data, minVal, maxVal) {
            const first = getSvgCoords(data[0].val, 0, minVal, maxVal);
            const last = getSvgCoords(data[data.length - 1].val, data.length - 1, minVal, maxVal);
            let path = buildSvgPath(data, minVal, maxVal);
            return `${path} L ${last.x.toFixed(1)} ${height - padding} L ${first.x.toFixed(1)} ${height - padding} Z`;
        }

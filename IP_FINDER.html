<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETERNA | IP VIVISECTOR CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --cyan: #06b6d4; --bg: #030303; --glass: rgba(255, 255, 255, 0.02); }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #fff; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-cyan { box-shadow: 0 0 40px rgba(6, 182, 212, 0.1); }
        #map { height: 100%; width: 100%; }
        .scanline { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(to right, transparent, var(--cyan), transparent); opacity: 0.2; animation: scan 4s linear infinite; z-index: 100; }
        @keyframes scan { 0% { transform: translateY(-100px); } 100% { transform: translateY(100vh); } }
        .terminal-scroll::-webkit-scrollbar { width: 2px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: var(--cyan); }
        .metric-card { border-left: 2px solid rgba(6, 182, 212, 0.3); }
    </style>
</head>
<body class="h-screen flex flex-col selection:bg-cyan-500 selection:text-black">
    <div class="scanline"></div>

    <!-- Top Bar -->
    <header class="h-20 glass-panel border-b border-white/5 flex items-center justify-between px-10 z-50">
        <div class="flex items-center gap-6">
            <div class="relative">
                <div class="w-10 h-10 border border-cyan-500 rotate-45 flex items-center justify-center">
                    <div class="w-4 h-4 bg-cyan-500 animate-pulse"></div>
                </div>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter mono uppercase">IP<span class="text-cyan-500">_VIVISECTOR</span></h1>
                <div class="text-[9px] text-cyan-500/60 tracking-[0.3em] mono uppercase">Infrastructure Localization Protocol // v4.2</div>
            </div>
        </div>
        <div class="flex gap-12 mono text-[10px] text-gray-500 uppercase tracking-widest">
            <div class="flex flex-col"><span class="text-cyan-500 font-bold">Latency</span> <span>&lt;1.2ms</span></div>
            <div class="flex flex-col"><span class="text-white font-bold">Substrate</span> <span>Ryzen 7000</span></div>
            <div class="flex flex-col"><span class="text-green-500 font-bold">Uptime</span> <span>99.999%</span></div>
        </div>
    </header>

    <div class="flex-grow flex p-6 gap-6 relative overflow-hidden">
        <!-- Sidebar Controls -->
        <aside class="w-96 flex flex-col gap-6 z-10">
            <div class="glass-panel p-8 rounded-3xl glow-cyan">
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-6">Target Identification</label>
                <div class="space-y-4">
                    <div class="relative group">
                        <input type="text" id="ip-input" placeholder="0.0.0.0" 
                               class="w-full bg-black/40 border border-white/10 rounded-2xl p-5 text-white mono focus:border-cyan-500 outline-none transition-all group-hover:border-white/20">
                        <i data-lucide="search" class="absolute right-5 top-5 text-gray-600 w-5 h-5"></i>
                    </div>
                    <button onclick="vivisect()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-5 rounded-2xl uppercase tracking-widest text-xs transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                        <i data-lucide="crosshair" class="w-4 h-4"></i> Execute Localization
                    </button>
                </div>
            </div>

            <div class="glass-panel p-8 rounded-3xl flex-grow overflow-hidden flex flex-col">
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-6">Cluster Intelligence</label>
                <div id="intel-grid" class="space-y-6 flex-grow">
                    <div class="metric-card pl-6 py-2">
                        <span class="block text-[10px] text-gray-600 uppercase mb-1">Carrier / ISP</span>
                        <span id="res-isp" class="text-sm font-bold text-gray-400">AWAITING_INGESTION</span>
                    </div>
                    <div class="metric-card pl-6 py-2">
                        <span class="block text-[10px] text-gray-600 uppercase mb-1">Organization</span>
                        <span id="res-org" class="text-sm font-bold text-gray-400">---</span>
                    </div>
                    <div class="metric-card pl-6 py-2">
                        <span class="block text-[10px] text-gray-600 uppercase mb-1">ASN Backbone</span>
                        <span id="res-asn" class="text-sm font-bold text-gray-400">---</span>
                    </div>
                    <div class="metric-card pl-6 py-2">
                        <span class="block text-[10px] text-gray-600 uppercase mb-1">Sovereign Certainty</span>
                        <div class="flex items-center gap-3 mt-2">
                            <div class="flex-grow bg-white/5 h-1 rounded-full overflow-hidden">
                                <div id="res-bar" class="h-full bg-cyan-500 w-0 transition-all duration-1000"></div>
                            </div>
                            <span id="res-pct" class="text-[10px] font-bold text-cyan-500">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Viewport (Map) -->
        <main class="flex-grow glass-panel rounded-[2rem] overflow-hidden relative border border-white/10">
            <div id="map"></div>
            
            <!-- Map HUD Overlays -->
            <div class="absolute top-8 left-8 glass-panel px-6 py-4 rounded-2xl flex items-center gap-4 border border-cyan-500/20 z-[1000]">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
                <span class="mono text-[10px] text-cyan-500 font-bold uppercase tracking-widest">Global Mesh Active</span>
            </div>

            <div class="absolute bottom-8 right-8 w-80 glass-panel p-6 rounded-2xl border border-white/10 z-[1000] flex flex-col h-48">
                <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-2">
                    <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Forensic Logs</span>
                    <i data-lucide="terminal" class="w-3 h-3 text-cyan-500"></i>
                </div>
                <div id="terminal" class="flex-grow terminal-scroll overflow-y-auto mono text-[10px] space-y-1 text-cyan-900/60 leading-relaxed">
                    <div>[SYS] VIVISECTOR_INITIALIZED...</div>
                    <div>[SYS] SYNC_LOCK: 7.83HZ</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        
        const map = L.map('map', { zoomControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let marker = null;

        function log(msg, type = 'default') {
            const term = document.getElementById('terminal');
            const div = document.createElement('div');
            const colors = {
                default: 'text-cyan-900/60',
                success: 'text-cyan-400',
                warn: 'text-yellow-500/80',
                error: 'text-red-500'
            };
            div.className = colors[type];
            div.innerText = `> ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        async function vivisect() {
            const ip = document.getElementById('ip-input').value;
            if(!ip) return;

            log(`INITIATING TRACE: ${ip}`, 'success');
            log(`DECRYPTING CLUSTER INODES...`);

            try {
                const res = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await res.json();
                if(data.error) throw new Error(data.reason);

                log(`SIGNAL RECOVERED: ${data.latitude}, ${data.longitude}`, 'success');
                log(`IDENTIFIED BACKBONE: ${data.org}`, 'warn');

                // UI Updates
                document.getElementById('res-isp').innerText = data.version + ' // ' + data.country_name;
                document.getElementById('res-org').innerText = data.org;
                document.getElementById('res-asn').innerText = data.asn;
                document.getElementById('res-pct').innerText = '100%';
                document.getElementById('res-bar').style.width = '100%';
                document.getElementById('res-isp').className = 'text-sm font-bold text-white';
                document.getElementById('res-org').className = 'text-sm font-bold text-white';
                document.getElementById('res-asn').className = 'text-sm font-bold text-white';

                const coords = [data.latitude, data.longitude];
                map.flyTo(coords, 12, { duration: 2 });
                
                if(marker) map.removeLayer(marker);
                
                const customIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class='w-6 h-6 border-2 border-cyan-500 rounded-full flex items-center justify-center animate-pulse'><div class='w-2 h-2 bg-cyan-500 rounded-full'></div></div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });

                marker = L.marker(coords, { icon: customIcon }).addTo(map)
                    .bindPopup(`<div class="mono p-2 text-black text-[10px]"><b>TARGET: ${ip}</b><br>${data.org}<br>${data.city}, ${data.country}</div>`)
                    .openPopup();

                log(`LOCALIZATION COMPLETE. MAPPING TARGET...`, 'success');

            } catch (e) {
                log(`FAILED: ${e.message}`, 'error');
            }
        }
    </script>
</body>
</html>
